apiVersion: v1
kind: Secret
metadata:
  name: streamingapp-secrets-brm
  labels:
    {{- include "streamingapp.labels" . | nindent 4 }}
type: Opaque
stringData:
  JWT_SECRET: {{ .Values.secrets.jwtSecret | quote }}
  AWS_ACCESS_KEY_ID: {{ .Values.secrets.awsAccessKeyId | quote }}
  AWS_SECRET_ACCESS_KEY: {{ .Values.secrets.awsSecretAccessKey | quote }}
  AWS_REGION: {{ .Values.secrets.awsRegion | quote }}
  AWS_S3_BUCKET: {{ .Values.secrets.awsS3Bucket | quote }}
  AWS_CDN_URL: {{ .Values.secrets.awsCdnUrl | quote }}
