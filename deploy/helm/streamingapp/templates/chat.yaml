apiVersion: apps/v1
kind: Deployment
metadata:
  name: streamingapp-chat-brm
  labels:
    {{- include "streamingapp.labels" . | nindent 4 }}
    app: streamingapp-chat-brm
spec:
  replicas: {{ .Values.services.chat.replicaCount }}
  selector:
    matchLabels:
      app: streamingapp-chat-brm
  template:
    metadata:
      labels:
        app: streamingapp-chat-brm
    spec:
      containers:
        - name: chat
          image: {{ include "streamingapp.image" (dict "root" . "component" "chat") }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.services.chat.containerPort }}
          env:
            - name: PORT
              value: {{ .Values.services.chat.containerPort | quote }}
            - name: MONGO_URI
              value: {{ .Values.global.mongoUri | quote }}
            - name: CLIENT_URLS
              value: {{ join "," .Values.global.clientUrls | quote }}
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: streamingapp-secrets-brm
                  key: JWT_SECRET
          readinessProbe:
            httpGet:
              path: /api/health
              port: {{ .Values.services.chat.containerPort }}
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /api/health
              port: {{ .Values.services.chat.containerPort }}
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            {{- toYaml .Values.services.chat.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: streamingapp-chat-brm
  labels:
    {{- include "streamingapp.labels" . | nindent 4 }}
    app: streamingapp-chat-brm
spec:
  type: ClusterIP
  selector:
    app: streamingapp-chat-brm
  ports:
    - name: http
      port: {{ .Values.services.chat.servicePort }}
      targetPort: {{ .Values.services.chat.containerPort }}
