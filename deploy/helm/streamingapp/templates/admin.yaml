apiVersion: apps/v1
kind: Deployment
metadata:
  name: streamingapp-admin-brm
  labels:
    {{- include "streamingapp.labels" . | nindent 4 }}
    app: streamingapp-admin-brm
spec:
  replicas: {{ .Values.services.admin.replicaCount }}
  selector:
    matchLabels:
      app: streamingapp-admin-brm
  template:
    metadata:
      labels:
        app: streamingapp-admin-brm
    spec:
      containers:
        - name: admin
          image: {{ include "streamingapp.image" (dict "root" . "component" "admin") }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.services.admin.containerPort }}
          env:
            - name: PORT
              value: {{ .Values.services.admin.containerPort | quote }}
            - name: MONGO_URI
              value: {{ .Values.global.mongoUri | quote }}
            - name: CLIENT_URLS
              value: {{ join "," .Values.global.clientUrls | quote }}
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: streamingapp-secrets-brm
                  key: JWT_SECRET
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: streamingapp-secrets-brm
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: streamingapp-secrets-brm
                  key: AWS_SECRET_ACCESS_KEY
            - name: AWS_REGION
              valueFrom:
                secretKeyRef:
                  name: streamingapp-secrets-brm
                  key: AWS_REGION
            - name: AWS_S3_BUCKET
              valueFrom:
                secretKeyRef:
                  name: streamingapp-secrets-brm
                  key: AWS_S3_BUCKET
            - name: AWS_CDN_URL
              valueFrom:
                secretKeyRef:
                  name: streamingapp-secrets-brm
                  key: AWS_CDN_URL
          readinessProbe:
            httpGet:
              path: /api/health
              port: {{ .Values.services.admin.containerPort }}
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /api/health
              port: {{ .Values.services.admin.containerPort }}
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            {{- toYaml .Values.services.admin.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: streamingapp-admin-brm
  labels:
    {{- include "streamingapp.labels" . | nindent 4 }}
    app: streamingapp-admin-brm
spec:
  type: ClusterIP
  selector:
    app: streamingapp-admin-brm
  ports:
    - name: http
      port: {{ .Values.services.admin.servicePort }}
      targetPort: {{ .Values.services.admin.containerPort }}
